name: policy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/check_policy.py
      - name: Reproduce changed verifiers
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python tools/check_verifier.py --base "$BASE_SHA"
