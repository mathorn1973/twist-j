name: policy

on:
  push:
    branches: [main]
    tags: [canon-v*]
  pull_request:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python tools/check_policy.py
      - run: python -m unittest discover -s tools -p 'test_*.py'
      - run: python tools/check_canon.py
      - run: python tools/check_ledger.py
      - name: Reproduce changed public probes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python tools/check_verifier.py --base "$BASE_SHA"
      - name: Reproduce changed minimal reproductions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python tools/check_reproduce.py --base "$BASE_SHA"
      - name: Run activation readback on immutable publication events
        if: github.ref_type == 'tag' || github.event_name == 'release'
        env:
          PUBLICATION_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          python tools/check_activation.py --full --post-activation \
            --expected-tag "$PUBLICATION_TAG" \
            --manifest-out activation-manifest.json
      - name: Preserve tag readback manifest
        if: github.ref_type == 'tag'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ github.ref_name }}-activation-manifest
          path: activation-manifest.json
          if-no-files-found: error
      - name: Verify published release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          mkdir -p /tmp/twistj-release
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY"
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern activation-manifest.json --pattern SHA256SUMS \
            --dir /tmp/twistj-release
          python tools/check_release_manifest.py \
            /tmp/twistj-release/activation-manifest.json \
            --expected-tag "$RELEASE_TAG"
          cmp canon/SHA256SUMS /tmp/twistj-release/SHA256SUMS
