name: policy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python tools/check_policy.py
      - run: python tools/check_canon.py
      - name: Reproduce changed public probes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python tools/check_verifier.py --base "$BASE_SHA"
      - name: Reproduce changed minimal reproductions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: python tools/check_reproduce.py --base "$BASE_SHA"
